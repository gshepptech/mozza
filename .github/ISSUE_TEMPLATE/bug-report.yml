name: Bug Report
description: Report a bug in Mozza
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the information below.
  - type: input
    id: version
    attributes:
      label: Mozza Version
      description: Output of `mozza version`
      placeholder: "mozza v1.0.0"
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Deployment Target
      options:
        - Local (Docker Compose)
        - Kubernetes
        - Both
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: textarea
    id: recipe
    attributes:
      label: Recipe File
      description: Your .mozza recipe (if relevant)
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant log output
      render: text
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14.0 / Ubuntu 22.04"
