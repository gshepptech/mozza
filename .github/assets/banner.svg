<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200" role="img" aria-label="Mozza — describe your app in plain English, Mozza writes the Kubernetes manifests">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E94F37"/>
      <stop offset="0.55" stop-color="#F2792B"/>
      <stop offset="1" stop-color="#F6A623"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.12" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="200" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="200" rx="20" fill="url(#glow)"/>

  <!-- pizza-slice mark -->
  <g transform="translate(78,80)">
    <path d="M 0 -34 L 31 28 A 34 34 0 0 1 -31 28 Z" fill="#FFFFFF"/>
    <path d="M 0 -26 L 24 22 A 26 26 0 0 1 -24 22 Z" fill="#FFD23F"/>
    <circle cx="-9" cy="3" r="4.3" fill="#E94F37"/>
    <circle cx="9" cy="0" r="3.7" fill="#E94F37"/>
    <circle cx="0" cy="17" r="3.7" fill="#E94F37"/>
  </g>

  <!-- wordmark (left-aligned, no text-anchor) -->
  <text x="132" y="98" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1">Mozza</text>

  <!-- tagline -->
  <text x="135" y="138" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#ffffff" opacity="0.97">Describe your app in plain English. Mozza writes the Kubernetes manifests.</text>

  <!-- recipe → resources chip -->
  <rect x="135" y="156" width="548" height="28" rx="14" fill="#ffffff" opacity="0.15"/>
  <text x="151" y="175" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#ffffff" opacity="0.95">open to the public on port 3000 &#8594; Deployment · Service · Ingress</text>
</svg>
